<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PestIQ</title>

<style>
/* --- Loader Container --- */
#app-loader {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
  overflow: hidden;
}

/* --- Animated Image --- */
#loading-image {
  width: 55%;          /* smaller = zoomed out */
  max-width: 700px;
  height: auto;
  object-fit: contain;

  /* removes white background visually */
  mix-blend-mode: screen;

  animation: sciFiZoom 6s ease-in-out infinite alternate;
}

/* --- Animation --- */
@keyframes sciFiZoom {
  0% {
    transform: scale(0.9); /* starts slightly zoomed out */
    filter: brightness(0.9);
  }

  100% {
    transform: scale(1.05); /* subtle zoom */
    filter: brightness(1.1);
  }
}

/* --- Fade Out --- */
.fade-out {
  opacity: 0;
  visibility: hidden;
}
</style>

alt="PestIQ Initialization"
/>
</div>

<div id="root"></div>


<script>
window.addEventListener('load', () => {
  const loader = document.getElementById('app-loader');

  const hideLoader = () => {
    loader.classList.add('fade-out');
  };

  setTimeout(hideLoader, 500);
});
</script>
